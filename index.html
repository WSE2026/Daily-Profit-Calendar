<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlingShot Trading Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c0f; font-family: 'Rajdhani', sans-serif; color: #dde4ef; min-height: 100vh; font-size: 16px; }

  .cal-root { padding: 40px 28px 24px; }

  /* Logo — centered */
  .logo-bar {
    display: flex; align-items: center; justify-content: center;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 22px;
  }
  .logo-bar img { height: 120px; width: auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    gap: 14px;
    position: relative;
  }
  .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .header-center img { height: 120px; width: auto; }
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .nav-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #dde4ef; width: 34px; height: 34px; border-radius: 4px;
    cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.14); }
  .month-label { font-size: 28px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #e8edf5; }
  .this-month-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #dde4ef; padding: 6px 18px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 1px; transition: background 0.2s;
  }
  .this-month-btn:hover { background: rgba(255,255,255,0.12); }

  /* Stats */
  .monthly-stats { display: flex; align-items: center; gap: 32px; }
  .stat-label { font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: #d0e2f4; font-weight: 600; margin-bottom: 4px; }
  /* Both stat values share same size */
  .stat-val,
  .stat-days {
    font-size: 26px; font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
  }
  .stat-days { color: #ffffff; }

  /* Profit / Loss colors */
  .positive { color: #00d26e; }
  .negative { color: #e02040; }

  /* Grid */
  .grid-wrapper { display: grid; grid-template-columns: 1fr 110px; gap: 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .day-header {
    text-align: center; padding: 10px 4px;
    font-size: 14px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #d0e2f4;
  }

  /* Day cells */
  .day-cell {
    min-height: 130px; border-radius: 4px; padding: 10px 12px;
    cursor: pointer; transition: filter 0.15s;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
  }
  .day-cell:hover { filter: brightness(1.2); }
  .day-cell.empty { background: transparent !important; border-color: transparent !important; cursor: default; pointer-events: none; }
  .day-cell.today { outline: 1px solid rgba(100,160,255,0.45); outline-offset: -1px; }

  .day-number { font-size: 15px; font-weight: 600; color: #a0b8d0; letter-spacing: 0.5px; margin-bottom: 8px; }
  .day-cell.has-data .day-number { color: #ffffff; }

  .pnl-val { font-family: 'Share Tech Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 7px; }
  .trade-info { font-size: 14px; color: #c8d8ee; font-weight: 600; }
  .win-rate { font-size: 14px; font-family: 'Share Tech Mono', monospace; margin-top: 5px; }

  /* Week column */
  .week-col { display: flex; flex-direction: column; gap: 3px; padding-left: 8px; }
  .week-header-spacer { height: 40px; }
  .week-stat {
    flex: 1; border-radius: 4px;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
    padding: 10px 14px; min-height: 130px;
  }
  .week-label { font-size: 13px; color: #b8cce0; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .week-pnl { font-family: 'Share Tech Mono', monospace; font-size: 20px; font-weight: 700; }
  .week-days { font-size: 13px; color: #b8cce0; margin-top: 5px; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(6px);
  }
  .overlay.hidden { display: none; }
  .modal {
    background: #131720; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 32px 36px; width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .modal-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #e8edf5; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: #c0d4e8; margin-bottom: 6px; font-weight: 600; }
  .field input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 10px 14px; color: #e8edf5;
    font-family: 'Share Tech Mono', monospace; font-size: 17px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: rgba(100,160,255,0.4); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1; padding: 11px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: 1px solid;
    transition: background 0.2s;
  }
  .btn-save { background: rgba(0,200,100,0.15); border-color: rgba(0,200,100,0.3); color: #00d26e; }
  .btn-save:hover { background: rgba(0,200,100,0.28); }
  .btn-cancel { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); color: #c8d8e8; }
  .btn-cancel:hover { background: rgba(255,255,255,0.1); }
  .btn-clear { background: rgba(220,30,50,0.1); border-color: rgba(220,30,50,0.25); color: #e02040; flex: 0.7; }
  .btn-clear:hover { background: rgba(220,30,50,0.22); }
</style>
</head>

<div class="overlay hidden" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="field">
      <label>P&amp;L ($)</label>
      <input type="number" id="inPnl" placeholder="e.g. 57.00 or -14.00" step="0.01">
    </div>
    <div class="field">
      <label>Trades</label>
      <input type="number" id="inTrades" placeholder="e.g. 3" min="0">
    </div>
    <div class="field">
      <label>Win Rate (%)</label>
      <input type="number" id="inWinRate" placeholder="e.g. 66.67" step="0.01" min="0" max="100">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-clear" onclick="clearDay()">Clear</button>
      <button class="btn btn-save" onclick="saveDay()">Save</button>
    </div>
  </div>
</div>

<script>
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let currentYear = 2026;
  let currentMonth = 1;
  let activeKey = null;

  // Data store — persisted in localStorage
  let tradeData = {};
  try {
    const saved = localStorage.getItem("slingshot_trades");
    if (saved) tradeData = JSON.parse(saved);
  } catch(e) {}

  // Pre-load Feb 2026 sample data if empty
  const sample = {
    "2026-02-03": { pnl: -14, trades: 1, winRate: 0 },
    "2026-02-09": { pnl: 57, trades: 1, winRate: 100 },
    "2026-02-10": { pnl: 7.12, trades: 3, winRate: 33.27 },
    "2026-02-11": { pnl: -30.9, trades: 2, winRate: 0 },
    "2026-02-12": { pnl: 16.1, trades: 3, winRate: 33.33 },
    "2026-02-13": { pnl: -41.9, trades: 2, winRate: 0 },
    "2026-02-17": { pnl: 62.1, trades: 2, winRate: 100 },
    "2026-02-18": { pnl: 6.08, trades: 2, winRate: 50 },
    "2026-02-19": { pnl: 18.1, trades: 3, winRate: 33.33 },
    "2026-02-20": { pnl: 9.12, trades: 3, winRate: 66.67 },
    "2026-02-23": { pnl: -77.8, trades: 4, winRate: 0 },
    "2026-02-24": { pnl: 4.12, trades: 2, winRate: 66.67 },
    "2026-02-25": { pnl: -49.8, trades: 4, winRate: 0 },
    "2026-02-26": { pnl: -54.8, trades: 3, winRate: 0 },
    "2026-02-27": { pnl: -51.9, trades: 3, winRate: 0 },
  };
  if (Object.keys(tradeData).length === 0) tradeData = { ...sample };

  function saveData() {
    try { localStorage.setItem("slingshot_trades", JSON.stringify(tradeData)); } catch(e) {}
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  function cellBg(pnl) {
    if (pnl > 50) return "rgba(0,210,110,0.22)";
    if (pnl > 0)  return "rgba(0,180,80,0.14)";
    if (pnl < -50) return "rgba(220,30,50,0.28)";
    return "rgba(180,20,40,0.18)";
  }
  function cellBorder(pnl) {
    return pnl >= 0 ? "1px solid rgba(0,210,110,0.35)" : "1px solid rgba(220,30,50,0.35)";
  }

  function render() {
    const today = new Date();
    const y = currentYear, m = currentMonth;
    const prefix = `${y}-${String(m+1).padStart(2,"0")}`;

    document.getElementById("monthLabel").textContent = `${MONTHS[m]} ${y}`;

    // Monthly stats
    let monthTotal = 0, tDays = 0;
    Object.entries(tradeData).forEach(([k, v]) => {
      if (k.startsWith(prefix)) { monthTotal += v.pnl; tDays++; }
    });
    const pnlEl = document.getElementById("monthPnl");
    pnlEl.textContent = (monthTotal >= 0 ? "+$" : "-$") + Math.abs(monthTotal).toFixed(0);
    pnlEl.className = "stat-val " + (monthTotal >= 0 ? "positive" : "negative");

    const daysEl = document.getElementById("tradingDays");
    daysEl.textContent = tDays + " days";

    // Build grid
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const firstDay = new Date(y, m, 1).getDay();

    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    // Headers
    DAYS.forEach(d => {
      const h = document.createElement("div");
      h.className = "day-header";
      h.textContent = d;
      grid.appendChild(h);
    });

    const weeks = [];
    for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

    weeks.forEach((week, wi) => {
      week.forEach(day => {
        const cell = document.createElement("div");
        if (!day) {
          cell.className = "day-cell empty";
        } else {
          const k = dateKey(y, m, day);
          const entry = tradeData[k];
          const isToday = y === today.getFullYear() && m === today.getMonth() && day === today.getDate();
          cell.className = "day-cell" + (entry ? " has-data" : "") + (isToday ? " today" : "");
          if (entry) {
            cell.style.background = cellBg(entry.pnl);
            cell.style.border = cellBorder(entry.pnl);
          }
          cell.innerHTML = `<div class="day-number">${day}</div>` +
            (entry ? `
              <div class="pnl-val ${entry.pnl >= 0 ? "positive" : "negative"}">${entry.pnl >= 0 ? "+$" : "-$"}${Math.abs(entry.pnl).toFixed(1)}</div>
              <div class="trade-info">${entry.trades} trade${entry.trades !== 1 ? "s" : ""}</div>
              <div class="win-rate ${entry.winRate >= 50 ? "positive" : "negative"}">${entry.winRate.toFixed(1)}%</div>
            ` : "");
          cell.onclick = () => openModal(k, day);
        }
        grid.appendChild(cell);
      });
    });

    // Week column
    const weekCol = document.getElementById("weekCol");
    weekCol.innerHTML = `<div class="week-header-spacer"></div>`;
    weeks.forEach((week, wi) => {
      let total = 0, td = 0;
      week.forEach(day => {
        if (!day) return;
        const k = dateKey(y, m, day);
        if (tradeData[k]) { total += tradeData[k].pnl; td++; }
      });
      const ws = document.createElement("div");
      ws.className = "week-stat";
      if (td > 0) {
        ws.style.background = total >= 0 ? "rgba(0,180,80,0.1)" : "rgba(200,20,40,0.1)";
        ws.style.borderColor = total >= 0 ? "rgba(0,180,80,0.25)" : "rgba(200,20,40,0.25)";
        ws.innerHTML = `
          <div class="week-label">WK ${wi+1}</div>
          <div class="week-pnl ${total >= 0 ? "positive" : "negative"}">${total >= 0 ? "+$" : "-$"}${Math.abs(total).toFixed(0)}</div>
          <div class="week-days">${td} day${td !== 1 ? "s" : ""}</div>
        `;
      } else {
        ws.innerHTML = `<div class="week-label">WK ${wi+1}</div><div class="week-days">—</div>`;
      }
      weekCol.appendChild(ws);
    });
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  }

  function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    render();
  }

  function openModal(key, day) {
    activeKey = key;
    const entry = tradeData[key];
    document.getElementById("modalTitle").textContent = `${MONTHS[currentMonth]} ${day}, ${currentYear}`;
    document.getElementById("inPnl").value = entry ? entry.pnl : "";
    document.getElementById("inTrades").value = entry ? entry.trades : "";
    document.getElementById("inWinRate").value = entry ? entry.winRate : "";
    document.getElementById("overlay").classList.remove("hidden");
    document.getElementById("inPnl").focus();
  }

  function closeModal() {
    document.getElementById("overlay").classList.add("hidden");
    activeKey = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("overlay")) closeModal();
  }

  function saveDay() {
    const pnl = parseFloat(document.getElementById("inPnl").value);
    if (isNaN(pnl)) { clearDay(); return; }
    tradeData[activeKey] = {
      pnl,
      trades: parseInt(document.getElementById("inTrades").value) || 0,
      winRate: parseFloat(document.getElementById("inWinRate").value) || 0
    };
    saveData();
    closeModal();
    render();
  }

  function clearDay() {
    delete tradeData[activeKey];
    saveData();
    closeModal();
    render();
  }

  // Keyboard support
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
    if (e.key === "Enter" && activeKey) saveDay();
  });

  render();
</script>
</body>
</html>
